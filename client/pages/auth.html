<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SecureAuth</title>
<link rel="stylesheet" href="../css/auth.css">
<link rel="stylesheet" href="../css/toast.css">
</head>
<body>
<div class="container">
<div id="loginSection">
<h1>SecureAuth</h1>
<p class="subtitle">Secure Login Authentication</p>
<form id="loginForm">
<input type="email" id="loginEmail" placeholder="Email Address">
<div class="passwordBox">
<input type="password" id="loginPassword" placeholder="Password">
<span class="togglePassword" data-target="signupPassword">👁</span>
</div>
<a href="#" class="forgotLink" id="forgotPasswordLink">Forgot Password?</a>
<button type="submit">Login</button>
</form>
<p>Don't have an account? <a href="#" id="showSignup">Create Account</a></p>
</div>
<div id="signupSection" style="display:none;">
<h1>SecureAuth</h1>
<p class="subtitle">Create your account</p>
<form id="signupForm">
<input type="text" id="signupName" placeholder="Full Name">
<div class="emailRow">
<input type="email" id="signupEmail" placeholder="Email Address">
<button type="button" id="sendOTPButton">Verify</button>
</div>
<input type="text" id="signupPhone" placeholder="Phone Number">
<div class="passwordBox">
<input type="password" id="signupPassword" placeholder="Password">
<span class="togglePassword" data-target="loginPassword">

<i class="fa-solid fa-eye"></i>

</span>
</div>
<div id="otpSection" style="display:none;">
<h3>Email Verification</h3>
<input type="text" id="signupOTP" placeholder="Enter OTP">
<button type="button" id="verifyOTPButton">Verify OTP</button>
<button type="button" id="resendOTPButton">Resend OTP</button>
</div>
<button type="submit" id="createAccountButton" disabled>Create Account</button>
</form>
<p>Already have an account? <a href="#" id="showLogin">Login</a></p>
</div>
</div>
<div class="googleWrapper">
<div class="divider"><span>OR</span></div>
<button type="button" id="googleLoginButton" class="googleButton">Continue with Google</button>
</div>
<!-- ==============================
     FORGOT PASSWORD MODAL
================================ -->

<div id="forgotModal" class="modal" style="display:none;">

    <div class="modalContent">

        <h2>Forgot Password</h2>

        <input
            type="email"
            id="forgotEmail"
            placeholder="Enter Email"
        >

        <button id="sendResetOTPButton">

            Send OTP

        </button>

        <input
            type="text"
            id="forgotOTP"
            placeholder="Enter OTP"
        >

        <button id="verifyResetOTPButton">

            Verify OTP

        </button>

        <input
            type="password"
            id="newPassword"
            placeholder="New Password"
        >

        <button id="resetPasswordButton">

            Update Password

        </button>

        <button id="closeForgotModal">

            Close

        </button>

    </div>

</div>
<script src="../js/toast.js"></script>
<script src="../js/auth.js"></script>

<script src="../js/ui.js"></script>

<script src="../js/login.js"></script>

<script src="../js/signup.js"></script>

<script src="../js/forgotPassword.js"></script>


</body>
</html>
